<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lacak Pesanan Laundry</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <style>
      body {
        font-family: Poppins, sans-serif;
        background: linear-gradient(135deg, #f4f8fc 0%, #eef6ff 100%);
        margin: 0;
        padding: 0;
      }

      .navbar {
        background: linear-gradient(90deg, #0d6efd, #00a2ff);
      }

      .page-wrap {
        min-height: calc(100vh - 76px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 16px;
      }

      .tracking-card {
        width: 100%;
        max-width: 680px;
        background: linear-gradient(145deg, #ffffff, #f7fbff);
        padding: 32px;
        border-radius: 24px;
        box-shadow: 0 20px 45px rgba(13, 110, 253, 0.14);
        border: 1px solid rgba(13, 110, 253, 0.08);
        backdrop-filter: blur(8px);
      }

      .tracking-header {
        text-align: center;
        margin-bottom: 22px;
        padding-bottom: 16px;
        border-bottom: 1px solid #eaf2ff;
      }

      /* right column sizing in header */
      .tracking-header .right {
        min-width: 220px;
        max-width: 360px;
      }

      /* stack input + tombol vertically and make button full width */
      .tracking-header .controls {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .tracking-header .controls .form-control { width: 100%; }

      h2 {
        color: #0d6efd;
        margin-bottom: 6px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }

      .subtitle {
        color: #6c757d;
        margin: 0;
        font-size: 0.95rem;
      }

      .form-control {
        border-radius: 12px;
        padding: 12px 14px;
        border: 1px solid #dce8f7;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);
      }

      .btn-track {
        width: 100%;
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: linear-gradient(90deg, #0d6efd, #00a2ff);
        border: none;
        font-weight: 600;
        box-shadow: 0 6px 16px rgba(13, 110, 253, 0.2);
      }

      .btn-track:hover {
        background: linear-gradient(90deg, #0b5ed7, #0096e6);
        transform: translateY(-1px);
      }

      #hasil {
        margin-top: 20px;
      }

      .result-card {
        background: linear-gradient(135deg, #eef8ff, #f9fcff);
        padding: 18px 20px;
        border-radius: 14px;
        border: 1px solid #dcecff;
        box-shadow: 0 6px 16px rgba(13, 110, 253, 0.06);
      }

      .result-card h3 {
        color: #0d6efd;
        margin-bottom: 10px;
      }

      .progress-table {
        margin-top: 22px;
        overflow-x: auto;
        border-radius: 14px;
        border: 1px solid #e7eef8;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);
      }

      .progress-table table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }

      .progress-table th,
      .progress-table td {
        padding: 12px 14px;
        border-bottom: 1px solid #edf3fb;
        text-align: left;
      }

      .time-text {
        display: block;
        font-size: 0.82rem;
        color: #6c757d;
        margin-top: 2px;
      }

      .progress-table th {
        background: linear-gradient(90deg, #f3f8ff, #eef6ff);
        color: #0d6efd;
        font-weight: 700;
      }

      .progress-table tr:last-child td {
        border-bottom: none;
      }

      .status-done {
        color: #198754;
        font-weight: 600;
      }

      .status-active {
        color: #0d6efd;
        font-weight: 600;
      }
      /* progress link: teks hitam dan bold */
      .progress-link {
        color: #000 !important;
        font-weight: 700;
        background: transparent;
        border: none;
        padding: 6px 12px;
        text-decoration: none;
      }
      .progress-link:hover { text-decoration: underline; color: #000 !important; }
      /* tombol biru dengan teks hitam */
      .btn-blue-black {
        background: linear-gradient(90deg, #0d6efd, #00a2ff);
        color: #000 !important;
        font-weight: 700;
        border: none;
        padding: .5rem .75rem;
        border-radius: .375rem;
        display: block;
        width: 100%;
        text-align: center;
        margin-top: 8px;
        text-decoration: none;
      }
      .btn-blue-black:hover { opacity: .95; color: #000 !important; text-decoration: none }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
          <i class="fa-solid fa-shirt"></i>
          Laundry Premium
        </a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Beranda</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="index.html#layanan">Layanan</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="lacak_pesanan.html">
                Progress cucian
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="index.html#harga">Harga</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="index.html#kontak">Kontak</a>
            </li>

            <li class="nav-item ms-2">
              <a href="admin-login.html" class="btn btn-warning">Login Admin</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="page-wrap">
      <div class="tracking-card">
        <div class="tracking-header">
          <h2><i class="fa-solid fa-shirt"></i> Progress Cucian Laundry</h2>
          <p class="subtitle">Masukkan kode untuk melihat status cucian Anda.</p>
        </div>

        <input
          type="text"
          id="kode"
          class="form-control"
          placeholder="Masukkan Kode"
        />

        <a href="progress-cucian.html" class="btn-blue-black">Progress Cucian</a>
  </body>
</html>
