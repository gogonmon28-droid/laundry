<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Laundry Premium</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Poppins, sans-serif;
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url("https://images.unsplash.com/photo-1626806787461-102c1bfaaea1");
        background-size: cover;
        background-position: center;
      }

      .login-box {
        width: 420px;
        padding: 40px;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(10px);
        color: white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      .btn-login {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="login-box">
      <div class="text-center mb-4">
        <h2>Login Admin</h2>
      </div>
      <div class="mb-3">
        <label>Username</label>
        <input
          type="text"
          id="username"
          class="form-control"
          placeholder="Masukkan Username"
        />
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input
          type="password"
          id="password"
          class="form-control"
          placeholder="Masukkan Password"
        />
      </div>
      <button class="btn btn-primary btn-login" onclick="loginAdmin()">
        Login
      </button>
      <div class="text-center mt-4">
        <p class="small text-white-50">Open Source • Data hanya tercatat di panel admin.</p>
        <a href="../index.html" class="text-warning">Kembali ke Beranda</a>
      </div>
    </div>
    <script>
      function loginAdmin() {
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;

        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
