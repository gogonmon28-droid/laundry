<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Layanan Laundry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
            max-width: 100%;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        body {
            background:
                linear-gradient(rgba(255, 255, 255, 0.92),
                    rgba(255, 255, 255, 0.92)),
                url('https://images.unsplash.com/photo-1626806787461-102c1bfaaea1');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .navbar-custom {
            background: white;
            padding: 20px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .1);
            margin-bottom: 20px;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .1);
        }


        .sidebar {
            width: 250px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            align-self: flex-start;
            height: 100vh;
            background: linear-gradient(180deg, #0f172a, #2563eb);
            padding: 20px;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            margin-bottom: 10px;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: .3s;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, .2);
        }

        .sidebar a.active {
            background: rgba(255, 255, 255, .25);
            font-weight: 600;
        }

        .main {
            flex: 1;
            min-width: 0;
        }
    </style>
</head>

<body>
    <div class="app-layout">
    <div class="sidebar">
        <h2>🧺 Laundry</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="pelanggan.html">👥 Pelanggan</a>
        <a href="layanan.html" class="active">🧼 Layanan</a>
        <a href="pesanan.html">📦 Pesanan</a>
        <a href="transaksi.html">💰 Transaksi</a>
        <a href="laporan.html">📊 Laporan</a>
        <a href="../index.html">🚪 Logout</a>
    </div>
    <div class="main">
        <div class="container-fluid p-4">
            <div class="card p-4">
                <h3 class="mb-4">Tambah Layanan</h3>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <input type="text" id="layanan" class="form-control" placeholder="Nama Layanan">
                    </div>
                    <div class="col-md-4 mb-3">
                        <input type="text" id="harga" class="form-control" placeholder="Harga">
                    </div>
                    <div class="col-md-4 mb-3">
                        <input type="text" id="estimasi" class="form-control" placeholder="Estimasi Waktu">
                    </div>
                </div><button class="btn btn-primary" onclick="tambahLayanan()">
                    + Tambah Layanan
                </button>
            </div>
            <div class="card p-4 mt-4">
                <h3>Daftar Layanan</h3>
                <table class="table table-striped table-hover mt-3">
                    <thead class="table-primary">
                        <tr>
                            <th>ID</th>
                            <th>Layanan</th>
                            <th>Harga</th>
                            <th>Estimasi</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="dataLayanan">
                        <tr>
                            <td>1</td>
                            <td>Cuci Setrika</td>
                            <td>Rp10.000/Kg</td>
                            <td>2 Hari</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="editBaris(this)">
                                    Edit
                                </button><button class="btn btn-danger btn-sm" onclick="hapusBaris(this)">
                                    Hapus
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        </div>
        <script>

            let nomor = 2;

            function tambahLayanan() {

                let layanan = document.getElementById("layanan").value;
                let harga = document.getElementById("harga").value;
                let estimasi = document.getElementById("estimasi").value;

                if (layanan == "" || harga == "" || estimasi == "") {

                    alert("Lengkapi data terlebih dahulu");

                    return;

                }

                let tabel = document.getElementById("dataLayanan");

                let row = tabel.insertRow();

                row.innerHTML = `
<td>${nomor++}</td>
<td>${layanan}</td>
<td>${harga}</td>
<td>${estimasi}</td>
<td>
<button class="btn btn-warning btn-sm" onclick="editBaris(this)">
Edit
</button>

<button class="btn btn-danger btn-sm" onclick="hapusBaris(this)">
Hapus
</button>
</td>
`;

                document.getElementById("layanan").value = "";
                document.getElementById("harga").value = "";
                document.getElementById("estimasi").value = "";

            }

            function hapusBaris(btn) {

                if (confirm("Yakin ingin menghapus layanan?")) {

                    btn.parentElement.parentElement.remove();

                }

            }

            function editBaris(btn) {

                let row = btn.parentElement.parentElement;

                let layanan = prompt("Edit Layanan", row.cells[1].innerText);
                let harga = prompt("Edit Harga", row.cells[2].innerText);
                let estimasi = prompt("Edit Estimasi", row.cells[3].innerText);

                if (layanan) {
                    row.cells[1].innerText = layanan;
                }

                if (harga) {
                    row.cells[2].innerText = harga;
                }

                if (estimasi) {
                    row.cells[3].innerText = estimasi;
                }

            }

        </script>
    </div>
</body>

</html>
