<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Premium - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Poppins, sans-serif;
            background:
                linear-gradient(rgba(0, 0, 0, .6), rgba(0, 0, 0, .6)),
                url('https://images.unsplash.com/photo-1626806787461-102c1bfaaea1');
            background-size: cover;
            background-position: center;
        }

        .login-box {
            width: 450px;
            padding: 40px;
            border-radius: 25px;
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(10px);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .4);
        }

        .logo {
            font-size: 70px;
            text-align: center;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="logo">
            🧺
        </div>
        <h2 class="text-center">
            Laundry Premium
        </h2>
        <p class="text-center">
            Login khusus untuk admin.
        </p>
        <div class="d-grid gap-3 mt-4">
            <a href="admin-login.html" class="btn btn-light btn-lg">Masuk ke Login Admin</a>
        </div>
        <p class="text-center mt-4 text-white-50">
            Sistem ini open source. Semua data pelanggan dan transaksi hanya tercatat dan dikelola melalui admin.
        </p>
    </div>
</body>

</html>
